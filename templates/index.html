<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tabbed Touch Control</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            color: white;
            font-family: sans-serif;
        }
        #nav-bar {
            height: 80px;
            background-color: #1f1f1f;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid #333;
        }
        .nav-btn {
            width: 60px;
            height: 60px;
            min-width: 60px;
            background-color: #4caf50;
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, opacity 0.2s;
        }
        .nav-btn:active {
            background-color: #45a049;
        }
        .nav-btn:disabled {
            background-color: #333;
            color: #777;
            cursor: not-allowed;
            opacity: 0.6;
        }
        #page-info-container {
            flex-grow: 1;
            text-align: right;
            padding-right: 10px;
            font-size: 0.9rem;
            color: #aaa;
        }
        #touch-area {
            width: 100vw;
            height: calc(100vh - 80px);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }
        .button {
            position: absolute;
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: background-color 0.1s;
            user-select: none;
            padding: 1rem;
            box-sizing: border-box;
            text-align: center;
            overflow-wrap: anywhere;
            touch-action: manipulation;
        }
        .button:active {
            background-color: #3d3d3d;
            border-color: #4caf50;
        }
        #status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <!-- ページ切り替えボタンがここに動的に生成されます -->
        <div id="page-info-container">
            <div id="page-title">Loading...</div>
        </div>
    </div>
    <div id="touch-area"></div>
    <div id="status">Ready</div>

    <script src="/index.js"></script>
</body>
</html>
