<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tabbed Touch Control</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
            color: white;
            font-family: sans-serif;
        }
        #nav-bar {
            height: 80px;
            background-color: #1f1f1f;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid #333;
        }
        .nav-btn {
            width: 60px;
            height: 60px;
            min-width: 60px;
            background-color: #4caf50;
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, opacity 0.2s;
        }
        .nav-btn:active {
            background-color: #45a049;
        }
        .nav-btn:disabled {
            background-color: #333;
            color: #777;
            cursor: not-allowed;
            opacity: 0.6;
        }
        #page-info-container {
            flex-grow: 1;
            text-align: right;
            padding-right: 10px;
            font-size: 0.9rem;
            color: #aaa;
        }
        #touch-area {
            width: 100vw;
            height: calc(100vh - 80px);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }
        .button {
            position: absolute;
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            transition: background-color 0.1s;
            user-select: none;
            padding: 1rem;
            box-sizing: border-box;
            text-align: center;
            overflow-wrap: anywhere;
            touch-action: manipulation;
        }
        .button:active {
            background-color: #3d3d3d;
            border-color: #4caf50;
        }
        #status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 100;
        }
        #qr-btn {
            width: 60px;
            height: 60px;
            min-width: 60px;
            background-color: #2196F3;
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }
        #qr-btn:active {
            background-color: #1565C0;
        }
        #qr-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        #qr-modal.open {
            display: flex;
        }
        #qr-modal-content {
            background: #1f1f1f;
            border: 1px solid #444;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            max-width: 90vw;
            position: relative;
        }
        #qr-modal-title {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 16px;
        }
        #qr-code-container {
            background: white;
            display: inline-block;
            padding: 12px;
            border-radius: 8px;
        }
        #qr-url-list {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .qr-url-item {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #ccc;
            transition: background-color 0.15s, border-color 0.15s;
        }
        .qr-url-item.selected {
            border-color: #2196F3;
            color: white;
        }
        .qr-url-item:hover {
            background-color: #333;
        }
        #qr-close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
            padding: 4px 8px;
            border-radius: 4px;
        }
        #qr-close-btn:hover {
            color: white;
            background-color: #333;
        }
        #qr-no-ip {
            color: #aaa;
            font-size: 0.95rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <!-- ページ切り替えボタンがここに動的に生成されます -->
        <div id="page-info-container">
            <div id="page-title">Loading...</div>
        </div>
        <button id="qr-btn" title="接続用QRコードを表示">&#x1F4F1;</button>
    </div>
    <div id="touch-area"></div>
    <div id="status">Ready</div>

    <!-- QRコードモーダル -->
    <div id="qr-modal" role="dialog" aria-modal="true" aria-label="接続用QRコード">
        <div id="qr-modal-content">
            <button id="qr-close-btn" aria-label="閉じる">&#x2715;</button>
            <div id="qr-modal-title">このサーバーに接続</div>
            <div id="qr-code-container"></div>
            <div id="qr-url-list"></div>
            <div id="qr-no-ip" style="display:none;">ローカルIPアドレスが見つかりませんでした</div>
        </div>
    </div>

    <script src="/qrcode.min.js"></script>
    <script src="/index.js"></script>
</body>
</html>
